<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>REALITY.EXE CORRUPTED</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  transition: transform 0.1s;
}

#hud {
  position: absolute;
  top: 10px;
  width: 100%;
  text-align: center;
  color: white;
  z-index: 10;
}

#world {
  position: absolute;
  width: 100%;
  height: 100%;
}
</style>
</head>

<body>

<div id="hud">REALITY STATUS: unstable</div>
<div id="world"></div>

<script>
const world = document.getElementById("world");
const hud = document.getElementById("hud");

let gravity = 1;
let money = -9999999999;

// 👥 fake multiplayer
const players = Array.from({length: 5}, (_, i) => ({
  name: "User_" + Math.floor(Math.random()*9999),
  x: Math.random()*window.innerWidth,
  y: Math.random()*window.innerHeight
}));

// 🌍 háttér káosz
setInterval(() => {
  document.body.style.background =
    `rgb(${Math.random()*255},${Math.random()*255},${Math.random()*255})`;
}, 50);

// 🔄 gravitáció randomizálás
setInterval(() => {
  gravity = (Math.random() * 4) - 2;
  hud.innerText = "GRAVITY: " + gravity.toFixed(2);
}, 1000);

// 💸 pénz rendszer (értelmetlen)
setInterval(() => {
  money -= Math.floor(Math.random()*1000000);
}, 800);

// 👥 “több játékos” mozgás
setInterval(() => {
  players.forEach(p => {
    p.x += (Math.random()-0.5)*20*gravity;
    p.y += (Math.random()-0.5)*20*gravity;
  });
}, 100);

// 🧠 REALITY GLITCH ENGINE (200 “funkció”)
const chaosFunctions = [];

for (let i = 0; i < 200; i++) {
  chaosFunctions.push(() => {

    // random effekt
    const r = Math.random();

    if (r < 0.2) {
      document.body.style.transform = `rotate(${Math.random()*360}deg)`;
    }

    if (r < 0.4) {
      world.innerHTML = "REALITY CORRUPTION #" + i;
    }

    if (r < 0.6) {
      hud.innerText = "SYSTEM ERROR " + Math.floor(Math.random()*9999);
    }

    if (r < 0.8) {
      document.body.style.filter = `blur(${Math.random()*5}px)`;
    }

    if (r < 0.95) {
      money -= Math.floor(Math.random()*10000000);
    }

  });
}

// ⚡ káosz loop (minden egyszerre fut)
setInterval(() => {
  chaosFunctions.forEach(fn => fn());
}, 200);

// 🚨 “valóság összeomlás” event
setInterval(() => {
  if (Math.random() > 0.85) {
    alert("⚠ REALITY FAILURE DETECTED");
  }
}, 3000);

</script>

</body>
</html>
